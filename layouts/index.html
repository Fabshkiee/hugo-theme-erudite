{{ define "main" }}
<div class="prose" style="max-width: var(--measure);">
    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
        {{ with .Site.Params.author.avatar }}
            <img src="{{ . }}" alt="{{ $.Site.Params.author.name }}" style="width: 3rem; height: 3rem; border-radius: 50%; object-fit: cover; margin: 0;">
        {{ end }}
        <div style="display: flex; flex-direction: column; gap: 0.125rem;">
            <div style="font-weight: 450; font-size: 1.125rem;">{{ .Site.Params.author.name }}</div>
            <div style="color: var(--muted-foreground); font-size: 0.875rem;">{{ .Site.Params.author.role }}</div>
        </div>
    </div>
    
    {{ .Content }}
</div>
{{ end }}
