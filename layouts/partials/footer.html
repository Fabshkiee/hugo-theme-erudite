<footer style="display: flex; justify-content: space-between; align-items: center; color: var(--muted-foreground); font-size: 0.875rem; padding-bottom: 2rem;">
    <div>
        &copy; {{ now.Format "2006" }} {{ .Site.Params.author.name | default .Site.Title }}
    </div>
    <div style="display: flex; gap: 1rem; align-items: center;">
        {{ range .Site.Menus.social }}
            <a href="{{ .URL }}" aria-label="{{ .Name }}" target="_blank" rel="noopener" style="color: inherit; text-decoration: none;">
                {{ if eq (lower .Name) "github" }}
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.02c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A4.8 4.8 0 0 0 8 18v4"/><path d="m9 18c-4.51 2-5-2-7-2"/></svg>
                {{ else if eq (lower .Name) "linkedin" }}
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
                {{ else }}
                {{ .Name }}
                {{ end }}
            </a>
        {{ end }}
    </div>
</footer>
